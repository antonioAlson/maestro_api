<div class="espelhos-container">
  <header class="espelhos-header">
    <div class="header-content">
      <h1>Espelhos</h1>
      <img src="opera.png" alt="Opera" class="header-brand" />
    </div>
  </header>

  <main class="espelhos-content">
    <input
      #projectFileInput
      class="hidden-file-input"
      type="file"
      accept="application/pdf,.pdf"
      (change)="onProjectFileSelected($event)"
    />

    <div class="board-tabs" role="tablist" aria-label="Filtros de Aguardando Projeto">
      <button
        type="button"
        class="board-tab"
        [class.active]="activeAguardandoTab === 'aramida'"
        [attr.aria-selected]="activeAguardandoTab === 'aramida'"
        (click)="setAguardandoTab('aramida')"
      >
        Aramida
      </button>
      <button
        type="button"
        class="board-tab"
        [class.active]="activeAguardandoTab === 'tenssylon'"
        [attr.aria-selected]="activeAguardandoTab === 'tenssylon'"
        (click)="setAguardandoTab('tenssylon')"
      >
        Tenssylon
      </button>
    </div>

    <section class="board board-top">
      <div class="board-header">
        <h2>Aguardando Projeto</h2>
      </div>
      <div class="board-list-wrapper">
        <div *ngIf="isLoadingAguardandoProjeto" class="board-state">Carregando cartões...</div>
        <div *ngIf="!isLoadingAguardandoProjeto && loadErrorAguardandoProjeto" class="board-state error">{{ loadErrorAguardandoProjeto }}</div>
        <ul class="board-list" aria-label="Lista horizontal quadro 1" *ngIf="!isLoadingAguardandoProjeto && !loadErrorAguardandoProjeto && filteredAguardandoProjetoItems.length > 0">
          <li
            class="list-item"
            *ngFor="let item of filteredAguardandoProjetoItems"
            [attr.data-id]="item.id"
            [title]="hasSelectedFileForCard(item.id) ? (getAguardandoProjetoDisplay(item).fullText + ' | PDF: ' + getSelectedFileNameForCard(item.id)) : getAguardandoProjetoDisplay(item).fullText"
            [class.tensylon]="item.id.startsWith('TENSYLON-')"
            [class.marked]="isAguardandoCardMarked(item.id)"
            (click)="onAguardandoCardClick(item, projectFileInput)"
          >
            {{ getAguardandoProjetoDisplay(item).text }}
          </li>
        </ul>
        <div *ngIf="!isLoadingAguardandoProjeto && !loadErrorAguardandoProjeto && filteredAguardandoProjetoItems.length === 0" class="board-state">Nenhum card na aba selecionada.</div>
      </div>
    </section>

    <div class="between-boards-actions">
      <button *ngIf="hasAnySelectedFile()" type="button" class="clear-btn" (click)="clearSelectedProjectFile()" [disabled]="isGeneratingEspelhos">
        Limpar Arquivo
      </button>
      <button type="button" class="generate-btn" (click)="gerarEspelhos()" [disabled]="!canGenerateEspelhos()">{{ isGeneratingEspelhos ? 'Gerando...' : 'Gerar Espelhos' }}</button>
    </div>

    <div *ngIf="generateMessage" class="generate-feedback" [class.success]="generateMessageType === 'success'" [class.error]="generateMessageType === 'error'">
      {{ generateMessage }}
    </div>

  </main>
</div>
