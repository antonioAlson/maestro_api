<div class="ordem-producao-container">
  <header class="ordem-producao-header">
    <div class="header-content">
      <h1>Ordem de Produção</h1>
      <img src="opera.png" alt="Opera" class="header-brand" />
    </div>
  </header>

  <main class="ordem-producao-content">
    <div class="routines-grid">
      <!-- Planejamento de Produção -->
      <button type="button" class="routine-card" (click)="openRoutine('planejamento')">
        <div class="card-icon" style="background: #e3f2fd;">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2196f3" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
            <path d="M9 12h6m-6 4h6"></path>
          </svg>
        </div>
        <div class="card-content">
          <h3>Planejamento de Produção</h3>
          <p>Criar e gerenciar planos de produção</p>
        </div>
      </button>

      <!-- Controle de Estoque -->
      <button type="button" class="routine-card" (click)="openRoutine('estoque')">
        <div class="card-icon" style="background: #f3e5f5;">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9c27b0" stroke-width="2">
            <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
          </svg>
        </div>
        <div class="card-content">
          <h3>Controle de Estoque</h3>
          <p>Monitorar materiais e insumos</p>
        </div>
      </button>

      <!-- Programação de Ordens -->
      <button type="button" class="routine-card" (click)="openRoutine('ordens')">
        <div class="card-icon" style="background: #e8f5e9;">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
        </div>
        <div class="card-content">
          <h3>Programação de Ordens</h3>
          <p>Sequenciar e agendar ordens de produção</p>
        </div>
      </button>

      <!-- Acompanhamento de Produção -->
      <button type="button" class="routine-card" (click)="openRoutine('acompanhamento')">
        <div class="card-icon" style="background: #fff4e5;">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ef6c00" stroke-width="2">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
          </svg>
        </div>
        <div class="card-content">
          <h3>Acompanhamento de Produção</h3>
          <p>Monitorar status e progresso</p>
        </div>
      </button>

      <!-- Gestão de Recursos -->
      <button type="button" class="routine-card" (click)="openRoutine('recursos')">
        <div class="card-icon" style="background: #fce4ec;">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#e91e63" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 00-3-3.87"></path>
            <path d="M16 3.13a4 4 0 010 7.75"></path>
          </svg>
        </div>
        <div class="card-content">
          <h3>Gestão de Recursos</h3>
          <p>Administrar máquinas e mão de obra</p>
        </div>
      </button>

      <!-- Relatórios de PCP -->
      <button type="button" class="routine-card" (click)="openRoutine('relatorios')">
        <div class="card-icon" style="background: #e0f2f1;">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#009688" stroke-width="2">
            <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
          </svg>
        </div>
        <div class="card-content">
          <h3>Relatórios de PCP</h3>
          <p>Visualizar indicadores e métricas</p>
        </div>
      </button>
    </div>
  </main>
</div>
