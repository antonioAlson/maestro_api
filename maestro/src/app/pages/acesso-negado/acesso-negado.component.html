<div class="acesso-negado-container">
  <div class="content-card">
    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
    </div>

    <h1>Acesso Negado</h1>
    
    <p class="message">
      Olá <strong>{{ userName }}</strong>, você não tem permissão para acessar esta página.
    </p>

    <p class="help-text">
      Se você acredita que deveria ter acesso a este conteúdo, entre em contato com o administrador do sistema.
    </p>

    <div class="actions">
      <button type="button" class="btn-secondary" (click)="goBack()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Voltar
      </button>
      <button type="button" class="btn-primary" (click)="goToHome()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
        </svg>
        Ir para Início
      </button>
    </div>
  </div>
</div>
