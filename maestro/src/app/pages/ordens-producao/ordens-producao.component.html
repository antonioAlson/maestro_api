<div class="ordens-container">
  <header class="ordens-header">
    <div class="header-content">
      <h1>Ordens de Produção</h1>
      <img src="opera.png" alt="Opera" class="header-brand" />
    </div>
  </header>

  <main class="ordens-content">
    <div class="routines-grid">
      <!-- Reprogramar em Massa -->
      <button type="button" class="routine-card" (click)="openRoutine('reprogramar-massa')">
        <div class="card-icon" style="background: #e3f2fd;">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2196f3" stroke-width="2">
            <path d="M21 12a9 9 0 11-6.219-8.56"></path>
            <polyline points="12 6 12 12 16 14"></polyline>
            <path d="M22 12l-3-3 3-3"></path>
          </svg>
        </div>
        <div class="card-content">
          <h3>Reprogramar em Massa</h3>
          <p>Alterar datas de múltiplas OPs</p>
        </div>
      </button>

      <!-- Imprimir OPs -->
      <button type="button" class="routine-card" (click)="openRoutine('imprimir-ops')">
        <div class="card-icon" style="background: #f3e5f5;">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#9c27b0" stroke-width="2">
            <polyline points="6 9 6 2 18 2 18 9"></polyline>
            <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"></path>
            <rect x="6" y="14" width="12" height="8"></rect>
          </svg>
        </div>
        <div class="card-content">
          <h3>Imprimir OPs</h3>
          <p>Gerar impressões de ordens</p>
        </div>
      </button>

      <!-- Alterar Datas Individualmente -->
      <button type="button" class="routine-card" (click)="openRoutine('alterar-datas')">
        <div class="card-icon" style="background: #e8f5e9;">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
            <path d="M11 14l2 2 4-4"></path>
          </svg>
        </div>
        <div class="card-content">
          <h3>Alterar Datas Individualmente</h3>
          <p>Modificar datas de OPs específicas</p>
        </div>
      </button>

      <!-- Reprogramar Datas CONTEC -->
      <button type="button" class="routine-card" (click)="openRoutine('reprogramar-contec')">
        <div class="card-icon" style="background: #fff4e5;">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ef6c00" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
            <path d="M3.05 11a9 9 0 01.5-2m1.5-3a9 9 0 011.5-1.5"></path>
          </svg>
        </div>
        <div class="card-content">
          <h3>Reprogramar Datas CONTEC</h3>
          <p>Sincronizar datas com sistema CONTEC</p>
        </div>
      </button>
    </div>
  </main>

  <!-- Modal de Reprogramação em Massa -->
  <div class="modal-overlay" *ngIf="showReprogramModal" (click)="closeReprogramModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>Reprogramar em Massa</h2>
        <button type="button" class="close-btn" (click)="closeReprogramModal()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label for="ids-input">
            IDs dos Cards (separados por vírgula, ponto e vírgula, espaço ou quebra de linha)
          </label>
          <textarea 
            id="ids-input"
            [(ngModel)]="idsInput"
            placeholder="Ex: MANTA-123, MANTA-124&#10;TENSYLON-456; MANTA-789"
            rows="6"
            [disabled]="isProcessing"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="date-input">
            Nova Data de Previsão
          </label>
          <input 
            type="text"
            id="date-input"
            [(ngModel)]="dateInput"
            placeholder="YYYY-MM-DD, DD/MM/YYYY ou DD-MM-YYYY"
            [disabled]="isProcessing"
          />
          <small class="help-text">Formatos aceitos: 2026-03-20, 20/03/2026, 20-03-2026</small>
        </div>

        <div class="result-message" *ngIf="resultMessage" [class.success]="resultType === 'success'" [class.error]="resultType === 'error'">
          <pre>{{ resultMessage }}</pre>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" (click)="closeReprogramModal()" [disabled]="isProcessing">
          Cancelar
        </button>
        <button type="button" class="btn-primary" (click)="reprogramar()" [disabled]="isProcessing">
          <span *ngIf="!isProcessing">Reprogramar</span>
          <span *ngIf="isProcessing">
            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/>
            </svg>
            Processando...
          </span>
        </button>
      </div>
    </div>
  </div>
</div>
