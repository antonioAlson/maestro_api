<div class="dashboard-container">
  <header class="dashboard-header">
    <div class="header-content">
      <h1>Inicio</h1>
      <img src="opera.png" alt="Opera" class="header-brand" />
    </div>
  </header>

  <main class="dashboard-content">
    <div class="stats-grid">
      <button
        type="button"
        class="stat-card"
        [class.active]="selectedMetric === 'deliveredThisMonth'"
        (click)="selectMetric('deliveredThisMonth', 'Entregas')"
      >
        <div class="stat-icon" style="background: #f3e5f5;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2">
            <path d="M20 7L9 18l-5-5"></path>
          </svg>
        </div>
        <div class="stat-info">
          <h3>Entregas</h3>
          <p class="metric-period">{{ currentMonthLabel }}:</p>
          <p class="metric-value">{{ metrics.deliveredThisMonth }}</p>
        </div>
      </button>
    </div>

    <section
      class="daily-chart-card"
      [class.metric-delivered]="selectedMetric === 'deliveredThisMonth'"
      *ngIf="dailySeries.length"
    >
      <div class="daily-chart-header">
        <div class="daily-chart-datetime">{{ currentDateTimeLabel }}</div>

        <div class="daily-chart-title">
          <h3>{{ currentMonthLabel }}</h3>
          <p>Total no mes: {{ selectedMetricTotal }}</p>
        </div>

        <div class="chart-style-switcher" aria-label="Trocar estilo de grafico">
          <button
            type="button"
            [class.active]="chartStyle === 'bars'"
            (click)="setChartStyle('bars')"
            aria-label="Grafico de barras"
            title="Grafico de barras"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M4 20V10"></path>
              <path d="M10 20V6"></path>
              <path d="M16 20V13"></path>
              <path d="M22 20V3"></path>
            </svg>
          </button>
          <button
            type="button"
            [class.active]="chartStyle === 'line'"
            (click)="setChartStyle('line')"
            aria-label="Grafico de linha"
            title="Grafico de linha"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="3 16 9 10 14 13 21 6"></polyline>
              <circle cx="3" cy="16" r="1"></circle>
              <circle cx="9" cy="10" r="1"></circle>
              <circle cx="14" cy="13" r="1"></circle>
              <circle cx="21" cy="6" r="1"></circle>
            </svg>
          </button>
          <button
            type="button"
            [class.active]="chartStyle === 'area'"
            (click)="setChartStyle('area')"
            aria-label="Grafico de area"
            title="Grafico de area"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M3 18L9 10L14 13L21 6V21H3Z"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="daily-chart-body">
        <div class="y-axis-labels">
          <span class="y-axis-label" *ngFor="let tick of yAxisTicks">{{ tick }}</span>
        </div>

        <div class="daily-chart-plot">
          <!-- Bars chart -->
          <div
            *ngIf="chartStyle === 'bars'"
            class="daily-bars"
            [style.--days]="daysInMonth"
            [style.--y-steps]="yAxisTicks.length - 1"
            >
            <div class="day-bar" *ngFor="let point of dailySeries" [title]="'Dia ' + point.day + ': ' + point.value">
              <div class="bar-area">
                <div
                  class="bar-fill"
                  [class.metric-delivered]="selectedMetric === 'deliveredThisMonth'"
                  [style.height.%]="getBarHeightPercent(point.value)"
                >
                  <span class="day-value-tooltip">{{ point.value }}</span>
                </div>
              </div>
              <span class="day-label">{{ point.day }}</span>
            </div>
          </div>

          <!-- Line chart -->
          <div
            *ngIf="chartStyle === 'line'"
            class="daily-bars mode-line"
            [style.--days]="daysInMonth"
            [style.--y-steps]="yAxisTicks.length - 1"
            >
            <div class="day-bar" *ngFor="let point of dailySeries" [title]="'Dia ' + point.day + ': ' + point.value">
              <div class="bar-area">
                <span
                  class="line-point-marker"
                  [style.bottom.%]="getBarHeightPercent(point.value)"
                ></span>
              </div>
              <span class="day-label">{{ point.day }}</span>
            </div>

            <svg class="daily-line-chart" viewBox="0 0 100 100" preserveAspectRatio="none">
              <polyline class="line-stroke" [attr.points]="getLinePoints(visibleSeries)"></polyline>
            </svg>
          </div>

          <!-- Area chart -->
          <div
            *ngIf="chartStyle === 'area'"
            class="daily-bars mode-line"
            [style.--days]="daysInMonth"
            [style.--y-steps]="yAxisTicks.length - 1"
            >
            <div class="day-bar" *ngFor="let point of dailySeries" [title]="'Dia ' + point.day + ': ' + point.value">
              <div class="bar-area">
                <span
                  class="line-point-marker"
                  [style.bottom.%]="getBarHeightPercent(point.value)"
                ></span>
              </div>
              <span class="day-label">{{ point.day }}</span>
            </div>

            <svg class="daily-line-chart" viewBox="0 0 100 100" preserveAspectRatio="none">
              <path
                class="area-fill"
                [attr.d]="getAreaPath(visibleSeries)"
              ></path>
              <polyline class="line-stroke" [attr.points]="getLinePoints(visibleSeries)"></polyline>
            </svg>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
