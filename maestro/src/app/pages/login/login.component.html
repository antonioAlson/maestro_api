<div class="login-container">
  <!-- Elementos animados de fundo -->
  <div class="background-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
    <div class="shape shape-5"></div>
    <div class="shape shape-6"></div>
  </div>
  
  <!-- Partículas flutuantes -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="login-card">
    <div class="login-header">
      <img src="maestro.png" alt="Maestro Logo" class="login-logo" />
      <h1 class="login-title">Maestro</h1>
      <p class="login-subtitle">Faça login na sua conta</p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <!-- Mensagem de Erro -->
      <div class="error-message" *ngIf="errorMessage">
        <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
        </svg>
        {{ errorMessage }}
      </div>

      <!-- Campo E-mail -->
      <div class="form-group">
        <label for="email" class="form-label">E-mail</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
          </svg>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            class="form-input"
            placeholder="seu@email.com"
            required
            [disabled]="isLoading"
          />
        </div>
      </div>

      <!-- Campo Senha -->
      <div class="form-group">
        <label for="password" class="form-label">Senha</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
          </svg>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            class="form-input"
            placeholder="••••••••"
            required
            [disabled]="isLoading"
          />
        </div>
      </div>

      <!-- Lembrar-me e Esqueceu a senha -->
      <div class="form-options">
        <label class="checkbox-label">
          <input
            type="checkbox"
            name="rememberMe"
            [(ngModel)]="rememberMe"
            [disabled]="isLoading"
          />
          <span>Lembrar-me</span>
        </label>
        <button
          type="button"
          class="forgot-password-link"
          (click)="onForgotPassword()"
          [disabled]="isLoading"
        >
          Esqueceu a senha?
        </button>
      </div>

      <!-- Botão de Login -->
      <button
        type="submit"
        class="login-button"
        [disabled]="isLoading || !loginForm.valid"
      >
        <span *ngIf="!isLoading">Entrar</span>
        <span *ngIf="isLoading" class="loading-spinner">
          <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="spinner-circle" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="spinner-path" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Entrando...
        </span>
      </button>
    </form>

    <!-- Registro -->
    <div class="register-section">
      <p class="register-text">
        Não tem uma conta?
        <a href="#" class="register-link">Cadastre-se</a>
      </p>
    </div>
  </div>
</div>
