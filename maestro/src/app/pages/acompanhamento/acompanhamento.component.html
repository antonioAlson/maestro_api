<div class="cronograma-container">
  <!-- Cabeçalho -->
  <header class="cronograma-header">
    <div class="header-left">
      <img src="opera.png" alt="Opera" class="logo" />
    </div>
    <div class="header-center">
      <h1>cronograma de corte diário</h1>
    </div>
    <div class="header-right">
      <div class="data-producao-box">
        <label>PRODUÇÃO:</label>
        <input 
          type="date" 
          [(ngModel)]="dataProducao" 
          (change)="onDataChange()"
          class="date-input"
        />
      </div>
    </div>
  </header>

  <div class="update-card-bar">
    <label for="card-id-input">ID(s) do Card:</label>
    <input
      id="card-id-input"
      type="text"
      [(ngModel)]="cardIdInput"
      placeholder="Ex: MANTA-123, MANTA-124 ou por quebra de linha"
      [disabled]="isAtualizandoCard"
    />
    <button type="button" (click)="atualizarPorCardId()" [disabled]="isAtualizandoCard">
      {{ isAtualizandoCard ? 'Atualizando...' : 'Atualizar Cards' }}
    </button>
  </div>

  <div class="update-feedback" *ngIf="updateMessage" [class.success]="updateMessageType === 'success'" [class.error]="updateMessageType === 'error'">
    {{ updateMessage }}
  </div>

  <!-- Loading -->
  <div class="loading-container" *ngIf="isLoading">
    <div class="spinner"></div>
    <p>Carregando cronograma...</p>
  </div>

  <!-- Erro -->
  <div class="error-container" *ngIf="errorMessage && !isLoading">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <p>{{ errorMessage }}</p>
    <button class="btn-retry" (click)="carregarDados()">Tentar novamente</button>
  </div>

  <!-- Tabela -->
  <div class="table-wrapper" *ngIf="!isLoading && !errorMessage">
    <table class="cronograma-table">
      <thead>
        <tr>
          <th class="col-seq">SEQ.</th>
          <th class="col-tipo">TIPO</th>
          <th class="col-os">OS</th>
          <th class="col-veiculo">VEÍCULO</th>
          <th class="col-data">DATA DE ENTREGA</th>
          <th class="col-obs">OBS</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of filteredItems" [ngClass]="getStatusClass(item.status)">
          <td class="col-seq">{{ item.seq }}</td>
          <td class="col-tipo">{{ item.tipo }}</td>
          <td class="col-os">{{ item.os }}</td>
          <td class="col-veiculo">{{ item.veiculo }}</td>
          <td class="col-data">{{ item.dataEntrega }}</td>
          <td class="col-obs">{{ item.obs }}</td>
        </tr>
        <tr *ngIf="filteredItems.length === 0">
          <td colspan="6" class="empty-message">
            Nenhum item encontrado para a data selecionada
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Botão de Impressão -->
  <div class="print-button-container" *ngIf="!isLoading && !errorMessage && filteredItems.length > 0">
    <button class="btn-print" (click)="imprimirCronograma()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 6 2 18 2 18 9"></polyline>
        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
        <rect x="6" y="14" width="12" height="8"></rect>
      </svg>
      Imprimir Cronograma
    </button>
  </div>
</div>
