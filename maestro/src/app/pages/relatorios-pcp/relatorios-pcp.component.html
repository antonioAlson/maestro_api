<div class="relatorios-container">
  <header class="relatorios-header">
    <div class="header-content">
      <h1>Relatórios PCP</h1>
      <img src="opera.png" alt="Opera" class="header-brand" />
    </div>
  </header>

  <main class="relatorios-content">
    <!-- Mensagem de feedback -->
    <div *ngIf="message" class="message" [class.success]="messageType === 'success'" [class.error]="messageType === 'error'">
      <svg *ngIf="messageType === 'success'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      <svg *ngIf="messageType === 'error'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>{{ message }}</span>
    </div>

    <div class="reports-grid">
      <!-- Relatório Jira -->
      <button type="button" class="report-card" (click)="generateJiraReport()" [disabled]="isGenerating">
        <div class="card-icon" style="background: #e3f2fd;">
          <svg *ngIf="!isGenerating" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2196f3" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          <!-- Spinner de loading -->
          <svg *ngIf="isGenerating" class="spinner" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2196f3" stroke-width="2">
            <path d="M21 12a9 9 0 11-6.219-8.56"></path>
          </svg>
        </div>
        <div class="card-content">
          <h3>{{ isGenerating ? 'Gerando...' : 'Relatório Jira' }}</h3>
          <p>{{ isGenerating ? 'Aguarde, exportando dados' : 'Exportar dados para Excel' }}</p>
        </div>
      </button>

      <!-- Carros CONTEC -->
      <button type="button" class="report-card" (click)="generateContecReport()" [disabled]="isGeneratingContec">
        <div class="card-icon" style="background: #e8f5e9;">
          <svg *ngIf="!isGeneratingContec" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <path d="M8 13h2v4H8z"></path>
            <path d="M14 13h2v4h-2z"></path>
          </svg>
          <!-- Spinner de loading -->
          <svg *ngIf="isGeneratingContec" class="spinner" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="2">
            <path d="M21 12a9 9 0 11-6.219-8.56"></path>
          </svg>
        </div>
        <div class="card-content">
          <h3>{{ isGeneratingContec ? 'Gerando...' : 'Carros CONTEC' }}</h3>
          <p>{{ isGeneratingContec ? 'Aguarde, exportando dados' : 'Exportar relatório CONTEC' }}</p>
        </div>
      </button>
    </div>
  </main>
</div>
