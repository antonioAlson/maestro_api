<div class="relatorios-container">
  <header class="relatorios-header">
    <div class="header-content">
      <h1>Relatórios PCP</h1>
      <img src="opera.png" alt="Opera" class="header-brand" />
    </div>
  </header>

  <main class="relatorios-content">
    <div class="reports-grid">
      <!-- Relatório Jira -->
      <button type="button" class="report-card" (click)="openReport('jira')">
        <div class="card-icon" style="background: #e3f2fd;">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2196f3" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </div>
        <div class="card-content">
          <h3>Relatório Jira</h3>
          <p>Exportar dados para Jira</p>
        </div>
      </button>
    </div>
  </main>
</div>
